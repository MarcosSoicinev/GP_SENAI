<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Votação Mascote SENAI</title>

<style>
body{
    font-family:'Segoe UI', Arial, sans-serif;
    background:#2d5a7f;
    color:white;
    margin:0;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

h1{text-align:center}

.topbar{
    text-align:center;
    margin-bottom:20px;
}

.topbar button{
    padding:10px 20px;
    margin:5px;
    cursor:pointer;
}

.opcoes{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(180px,1fr));
    gap:15px;
}

.card{
    background:#fff;
    color:#000;
    padding:10px;
    border-radius:10px;
    text-align:center;
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.btn-voto{
    background:orange;
    border:none;
    padding:10px;
    width:100%;
    cursor:pointer;
}

#tela-ranking{
    display:none;
}

.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    align-items:center;
    justify-content:center;
}

.box{
    background:#fff;
    color:#000;
    padding:30px;
    border-radius:10px;
    text-align:center;
}

</style>
</head>
<body>

<div class="container">
    <h1>Votação Mascote</h1>

    <div class="topbar">
        <button onclick="abrirTela('votacao')">Votação</button>
        <button onclick="abrirTela('ranking')">Ranking</button>
    </div>

    <div id="tela-votacao">
        <div class="opcoes" id="cards"></div>
    </div>

    <div id="tela-ranking">
        <h2>Ranking</h2>
        <div id="ranking"></div>
    </div>
</div>

<div class="modal" id="modal">
    <div class="box">
        <h2>Voto confirmado</h2>
        <h1 id="tempo">15</h1>
    </div>
</div>

<script>

const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbwYNCmPXlgKwQjfucgNytbb6vMM1NyOyVW2prpC-ugjeQkxziVDDgwwxDhfAXYrVd_3yQ/exec";

const mascotes = [
    { id:'senatron', nome:'SENATRON', img:'img/01 - SENATRON.jpg' },
    { id:'eric', nome:'Eric', img:'img/02 - Aluno Eric da turma de polímeros.jpg' },
    { id:'maria', nome:'Maria', img:'img/03 - Maria Gabrielle Oliveira de Paula.jpg' },
    { id:'gabriel', nome:'Gabriel', img:'img/04 - Gabriel.jpg' },
    { id:'volts', nome:'Volts', img:'img/05 - breno almeida felix - volts.jpg' },
    { id:'amanda', nome:'Amanda', img:'img/06 - uni 7 - Amanda dos Santos Melo.jpg' },
    { id:'clecio', nome:'Clecio', img:'img/07 - voltz - Clecio De Oliveira Coelho.jpg' },
    { id:'jubao', nome:'Jubão', img:'img/08 - jubão - Demétrio da Silva costa costa.jpg' },
    { id:'volta', nome:'Volta', img:'img/09 - VOLTA - Valniele Maia Buriti Da Silva.jpg' }
];

let bloqueado = false;
let intervaloRanking = null;

function renderCards(){
    const c = document.getElementById("cards");

    c.innerHTML = mascotes.map(m => `
        <div class="card">
            <img src="${m.img}">
            <h3>${m.nome}</h3>
            <button class="btn-voto" onclick="votar('${m.id}')">Votar</button>
        </div>
    `).join("");
}

async function votar(id){
    if(bloqueado) return;

    bloqueado = true;

    await fetch(`${WEBAPP_URL}?action=vote&id=${id}`);

    iniciarTimer();
}

function iniciarTimer(){
    let t = 15;
    document.getElementById("modal").style.display="flex";

    let i = setInterval(()=>{
        t--;
        document.getElementById("tempo").innerText = t;

        if(t<=0){
            clearInterval(i);
            document.getElementById("modal").style.display="none";
            bloqueado = false;
        }
    },1000);
}

async function atualizarRanking(){
    const r = await fetch(WEBAPP_URL);
    const data = await r.json();

    const lista = data.ranking.map(i => `
        <p>${i.nome} - ${i.votos}</p>
    `).join("");

    document.getElementById("ranking").innerHTML = lista;
}

function abrirTela(tela){

    if(tela === "ranking"){
        const senha = prompt("Digite a senha:");

        if(senha !== "SAGACETAFR"){
            alert("Senha incorreta");
            return;
        }

        document.getElementById("tela-votacao").style.display="none";
        document.getElementById("tela-ranking").style.display="block";

        atualizarRanking();

        if(intervaloRanking){
            clearInterval(intervaloRanking);
        }

        intervaloRanking = setInterval(atualizarRanking,1000);

    }else{
        document.getElementById("tela-votacao").style.display="block";
        document.getElementById("tela-ranking").style.display="none";

        if(intervaloRanking){
            clearInterval(intervaloRanking);
            intervaloRanking = null;
        }
    }
}

renderCards();

</script>

</body>
</html>
