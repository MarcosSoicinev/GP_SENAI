<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Votação Mascote SENAI</title>

<style>
*{
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI', Arial, sans-serif;
    background:linear-gradient(135deg,#1a3a5a 0%,#2d5a7f 100%);
    color:white;
    margin:0;
    min-height:100vh;
}

.container{
    max-width:1200px;
    margin:0 auto;
    padding:20px;
}

header{
    text-align:center;
    margin-bottom:30px;
}

h1{
    font-size:2.2rem;
    margin:0 0 8px 0;
    text-transform:uppercase;
    letter-spacing:1px;
}

.subtitulo{
    color:rgba(255,255,255,0.85);
    margin-bottom:18px;
    font-size:0.95rem;
}

.topbar{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:22px;
}

.topbar button{
    background:rgba(255,255,255,0.14);
    color:#fff;
    border:1px solid rgba(255,255,255,0.35);
    padding:10px 18px;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
    transition:0.25s;
}

.topbar button:hover{
    background:rgba(255,255,255,0.22);
}

.topbar button.ativo{
    background:#ff8c00;
    border-color:#ff8c00;
}

#tela-votacao{
    display:block;
}

#tela-ranking{
    display:none;
}

.opcoes{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));
    gap:16px;
}

.card{
    background:#fff;
    border-radius:14px;
    padding:12px;
    text-align:center;
    color:#123a5c;
    box-shadow:0 5px 16px rgba(0,0,0,0.22);
    border:3px solid transparent;
    transition:0.25s;
}

.card:hover{
    border-color:#ff8c00;
    transform:translateY(-4px);
}

.card img{
    width:100%;
    height:190px;
    object-fit:cover;
    border-radius:10px;
    margin-bottom:10px;
    background:#eef2f7;
    border:2px solid #d7e0ea;
}

.card-nome{
    font-weight:bold;
    font-size:1rem;
    margin-bottom:10px;
    min-height:24px;
}

.btn-voto{
    width:100%;
    background:#ff8c00;
    color:#fff;
    border:none;
    border-radius:8px;
    padding:10px;
    font-weight:bold;
    cursor:pointer;
    font-size:0.92rem;
    transition:0.2s;
}

.btn-voto:hover{
    background:#e67e00;
    transform:scale(1.02);
}

.btn-voto:disabled{
    opacity:.65;
    cursor:not-allowed;
    transform:none;
}

.ranking-box{
    background:rgba(255,255,255,0.96);
    color:#333;
    border-radius:14px;
    padding:20px;
    box-shadow:0 6px 18px rgba(0,0,0,0.18);
}

.ranking-titulo{
    color:#1a3a5a;
    font-weight:bold;
    font-size:1.2rem;
    margin-bottom:16px;
    text-align:center;
}

.ranking-items{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(240px, 1fr));
    gap:14px;
}

.item-rank{
    background:#f8f9fa;
    padding:12px;
    border-radius:10px;
    border-left:4px solid #ff8c00;
}

.rank-topo{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:10px;
}

.rank-pos{
    background:#ff8c00;
    color:#fff;
    width:28px;
    height:28px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    font-size:0.85rem;
    flex-shrink:0;
}

.rank-foto{
    width:42px;
    height:42px;
    border-radius:50%;
    object-fit:cover;
    border:2px solid #d5dde6;
    background:#eef2f7;
    flex-shrink:0;
}

.rank-nome{
    flex:1;
    font-weight:bold;
    color:#1a3a5a;
    text-align:left;
}

.info-rank{
    display:flex;
    justify-content:space-between;
    font-size:0.85rem;
    font-weight:bold;
    color:#1a3a5a;
    margin-bottom:7px;
}

.barra-fundo{
    background:#ddd;
    height:12px;
    border-radius:8px;
    overflow:hidden;
}

.barra-progresso{
    height:100%;
    background:linear-gradient(90deg,#1a3a5a,#ff8c00);
    width:0%;
    transition:width 0.6s ease;
}

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.72);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:1000;
}

.box{
    background:white;
    color:#333;
    border-radius:16px;
    padding:30px;
    text-align:center;
    max-width:360px;
    width:calc(100% - 30px);
    box-shadow:0 12px 40px rgba(0,0,0,0.35);
}

.box h2{
    color:#1a3a5a;
    margin-bottom:8px;
    font-size:1.5rem;
}

.gauge-wrap{
    display:flex;
    justify-content:center;
    align-items:center;
    margin:18px 0 10px;
}

.gauge{
    width:160px;
    height:160px;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
}

.gauge svg{
    width:160px;
    height:160px;
    display:block;
    transform:rotate(-90deg);
}

.gauge-bg{
    fill:none;
    stroke:#e6e6e6;
    stroke-width:12;
}

.gauge-progress{
    fill:none;
    stroke:#28a745;
    stroke-width:12;
    stroke-linecap:round;
    stroke-dasharray:377;
    stroke-dashoffset:0;
    transition:stroke-dashoffset 1s linear, stroke 0.3s ease;
}

.gauge-label{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    color:#1a3a5a;
    pointer-events:none;
}

.tempo-numero{
    font-size:2.2rem;
    font-weight:700;
    line-height:1;
}

.tempo-texto{
    font-size:0.82rem;
    color:#666;
    margin-top:6px;
    text-transform:uppercase;
    letter-spacing:0.5px;
}

.status-api{
    text-align:center;
    margin-top:14px;
    font-size:.9rem;
    opacity:.9;
}

@media (max-width:700px){
    .card img{
        height:160px;
    }

    .ranking-items{
        grid-template-columns:1fr;
    }
}
</style>
</head>
<body>

<div class="container">
    <header>
        <h1>Votação Mascote</h1>
        <div class="subtitulo">Sistema de votação do SENAI</div>

        <div class="topbar">
            <button id="btnVotacao" class="ativo" onclick="abrirTela('votacao')">Tela de Votação</button>
            <button id="btnRanking" onclick="abrirTela('ranking')">Tela de Ranking</button>
        </div>
    </header>

    <div id="tela-votacao">
        <div class="opcoes" id="cards"></div>
        <div class="status-api" id="statusApi"></div>
    </div>

    <div id="tela-ranking">
        <div class="ranking-box">
            <div class="ranking-titulo">Ranking em Tempo Real</div>
            <div class="ranking-items" id="ranking"></div>
        </div>
    </div>
</div>

<div class="modal" id="modal">
    <div class="box">
        <h2>Voto Confirmado</h2>

        <div class="gauge-wrap">
            <div class="gauge">
                <svg viewBox="0 0 140 140" aria-hidden="true">
                    <circle class="gauge-bg" cx="70" cy="70" r="60"></circle>
                    <circle class="gauge-progress" id="gaugeProgress" cx="70" cy="70" r="60"></circle>
                </svg>

                <div class="gauge-label">
                    <div class="tempo-numero" id="tempo">15</div>
                    <div class="tempo-texto">segundos</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbwYNCmPXlgKwQjfucgNytbb6vMM1NyOyVW2prpC-ugjeQkxziVDDgwwxDhfAXYrVd_3yQ/exec';
const SENHA_RANKING = 'SAGACETAFR';

function gerarPlaceholder(nome){
    const svg = `
    <svg xmlns="http://www.w3.org/2000/svg" width="400" height="400">
        <rect width="100%" height="100%" fill="#e9eef5"/>
        <rect x="18" y="18" width="364" height="364" rx="24" fill="#f7f9fc" stroke="#1a3a5a" stroke-width="6"/>
        <text x="50%" y="44%" font-size="28" text-anchor="middle" fill="#1a3a5a" font-family="Segoe UI, Arial, sans-serif" font-weight="bold">SEM IMAGEM</text>
        <text x="50%" y="58%" font-size="24" text-anchor="middle" fill="#ff8c00" font-family="Segoe UI, Arial, sans-serif">${nome}</text>
    </svg>`;
    return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
}

const mascotes = [
    { id:'senatron', nome:'SENATRON', img:'img/01 - SENATRON.jpg' },
    { id:'eric', nome:'Eric', img:'img/02 - Aluno Eric da turma de polímeros.jpg' },
    { id:'maria', nome:'Maria', img:'img/03 - Maria Gabrielle Oliveira de Paula.jpg' },
    { id:'gabriel', nome:'Gabriel', img:'img/04 - Gabriel.jpg' },
    { id:'volts', nome:'Volts', img:'img/05 - breno almeida felix - volts.jpg' },
    { id:'amanda', nome:'Amanda', img:'img/06 - uni 7 - Amanda dos Santos Melo.jpg' },
    { id:'clecio', nome:'Clecio', img:'img/07 - voltz - Clecio De Oliveira Coelho.jpg' },
    { id:'jubao', nome:'Jubão', img:'img/08 - jubão - Demétrio da Silva costa costa.jpg' },
    { id:'volta', nome:'Volta', img:'img/09 - VOLTA - Valniele Maia Buriti Da Silva.jpg' }
].map(m => ({ ...m, fallback: gerarPlaceholder(m.nome) }));

let bloqueado = false;
let intervaloRanking = null;

function renderCards(){
    const c = document.getElementById("cards");

    c.innerHTML = mascotes.map(m => `
        <div class="card">
            <img src="${m.img}" alt="${m.nome}" onerror="this.onerror=null;this.src='${m.fallback}'">
            <div class="card-nome">${m.nome}</div>
            <button class="btn-voto" id="btn_${m.id}" onclick="votar('${m.id}')">Votar</button>
        </div>
    `).join("");
}

async function buscarRanking(){
    const resp = await fetch(`${WEBAPP_URL}?action=ranking&_=${Date.now()}`);
    if (!resp.ok) throw new Error('Falha ao buscar ranking.');
    return await resp.json();
}

function desenharRanking(payload){
    const ranking = Array.isArray(payload.ranking) ? payload.ranking : [];
    const total = Number(payload.total) || 0;
    const r = document.getElementById("ranking");

    r.innerHTML = ranking.map((i, index) => {
        const meta = mascotes.find(m => m.id === i.id) || {};
        const p = total ? (Number(i.votos || 0) / total * 100) : 0;
        const fallback = meta.fallback || '';
        const img = meta.img || '';

        return `
            <div class="item-rank">
                <div class="rank-topo">
                    <div class="rank-pos">${index + 1}</div>
                    <img class="rank-foto" src="${img}" alt="${i.nome}" onerror="this.onerror=null;this.src='${fallback}'">
                    <div class="rank-nome">${i.nome}</div>
                </div>

                <div class="info-rank">
                    <span>${Number(i.votos || 0)} voto(s)</span>
                    <span>${p.toFixed(1)}%</span>
                </div>

                <div class="barra-fundo">
                    <div class="barra-progresso" style="width:${p}%"></div>
                </div>
            </div>
        `;
    }).join("");
}

async function atualizarRanking(){
    try{
        const payload = await buscarRanking();
        desenharRanking(payload);
        setStatus('Conectado ao Google Sheets.');
    }catch(err){
        setStatus('Erro ao conectar com o Google Sheets.');
        console.error(err);
    }
}

async function votar(id){
    if (bloqueado) return;

    try{
        bloqueado = true;
        desabilitarBotoes(true);

        const resp = await fetch(`${WEBAPP_URL}?action=vote&id=${encodeURIComponent(id)}&_=${Date.now()}`);
        const dados = await resp.json();

        if (!dados.ok) {
            throw new Error(dados.error || 'Erro ao registrar voto.');
        }

        if (dados.ranking && typeof dados.total !== 'undefined') {
            desenharRanking({
                ranking: dados.ranking,
                total: dados.total
            });
        } else {
            await atualizarRanking();
        }

        iniciarBloqueio15s();

    }catch(err){
        console.error(err);
        alert(err.message || 'Erro ao registrar voto.');
        bloqueado = false;
        desabilitarBotoes(false);
    }
}

function iniciarBloqueio15s(){
    const modal = document.getElementById("modal");
    const gauge = document.getElementById("gaugeProgress");
    const tempo = document.getElementById("tempo");

    modal.style.display = "flex";

    let t = 15;
    const total = 15;
    const raio = 60;
    const circumference = 2 * Math.PI * raio;

    gauge.style.strokeDasharray = `${circumference}`;
    gauge.style.strokeDashoffset = "0";
    gauge.style.stroke = "#28a745";
    tempo.innerText = t;

    const timer = setInterval(() => {
        t--;
        tempo.innerText = t;

        const progresso = (total - t) / total;
        gauge.style.strokeDashoffset = `${circumference * progresso}`;

        if (t <= 5) {
            gauge.style.stroke = "#dc3545";
        } else if (t <= 10) {
            gauge.style.stroke = "#ff8c00";
        } else {
            gauge.style.stroke = "#28a745";
        }

        if (t <= 0) {
            clearInterval(timer);
            modal.style.display = "none";
            bloqueado = false;
            desabilitarBotoes(false);
        }
    }, 1000);
}

function desabilitarBotoes(flag){
    mascotes.forEach(m => {
        const btn = document.getElementById(`btn_${m.id}`);
        if (btn) btn.disabled = flag;
    });
}

function abrirTela(tela){
    const telaVotacao = document.getElementById("tela-votacao");
    const telaRanking = document.getElementById("tela-ranking");
    const btnVotacao = document.getElementById("btnVotacao");
    const btnRanking = document.getElementById("btnRanking");

    if (tela === "ranking") {
        const senha = window.prompt("Digite a senha para acessar o ranking:");

        if (senha === null) return;

        if (senha !== SENHA_RANKING) {
            alert("Senha incorreta.");
            return;
        }

        telaVotacao.style.display = "none";
        telaRanking.style.display = "block";
        btnVotacao.classList.remove("ativo");
        btnRanking.classList.add("ativo");

        atualizarRanking();

        if (intervaloRanking) clearInterval(intervaloRanking);
        intervaloRanking = setInterval(atualizarRanking, 1000);
        return;
    }

    telaVotacao.style.display = "block";
    telaRanking.style.display = "none";
    btnVotacao.classList.add("ativo");
    btnRanking.classList.remove("ativo");

    if (intervaloRanking) {
        clearInterval(intervaloRanking);
        intervaloRanking = null;
    }
}

function setStatus(msg){
    const el = document.getElementById('statusApi');
    if (el) el.textContent = msg;
}

renderCards();
atualizarRanking();
abrirTela('votacao');
</script>

</body>
</html>
