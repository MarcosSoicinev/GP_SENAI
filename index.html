<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Votação Mascote SENAI</title>

<style>
*{
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI', Arial, sans-serif;
    background:linear-gradient(135deg,#1a3a5a 0%,#2d5a7f 100%);
    color:white;
    margin:0;
    min-height:100vh;
}

.container{
    max-width:1280px;
    margin:0 auto;
    padding:20px;
}

header{
    text-align:center;
    margin-bottom:30px;
}

h1{
    font-size:2.6rem;
    margin:0 0 8px 0;
    text-transform:uppercase;
    letter-spacing:1px;
}

.subtitulo{
    color:rgba(255,255,255,0.88);
    margin-bottom:18px;
    font-size:1rem;
}

.topbar{
    display:flex;
    justify-content:center;
    gap:12px;
    flex-wrap:wrap;
    margin-bottom:24px;
}

.topbar button{
    background:rgba(255,255,255,0.14);
    color:#fff;
    border:1px solid rgba(255,255,255,0.35);
    padding:12px 22px;
    border-radius:10px;
    cursor:pointer;
    font-weight:700;
    transition:0.25s;
    font-size:1rem;
}

.topbar button:hover{
    background:rgba(255,255,255,0.22);
}

.topbar button.ativo{
    background:#ff8c00;
    border-color:#ff8c00;
}

#tela-votacao{
    display:block;
}

#tela-ranking{
    display:none;
}

.opcoes{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(190px, 1fr));
    gap:16px;
}

.card{
    background:#fff;
    border-radius:14px;
    padding:12px;
    text-align:center;
    color:#123a5c;
    box-shadow:0 5px 16px rgba(0,0,0,0.22);
    border:3px solid transparent;
    transition:0.25s;
}

.card:hover{
    border-color:#ff8c00;
    transform:translateY(-4px);
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
    border-radius:10px;
    margin-bottom:10px;
    background:#eef2f7;
    border:2px solid #d7e0ea;
}

.card-nome{
    font-weight:bold;
    font-size:1rem;
    margin-bottom:10px;
    min-height:24px;
}

.btn-voto{
    width:100%;
    background:#ff8c00;
    color:#fff;
    border:none;
    border-radius:8px;
    padding:10px;
    font-weight:bold;
    cursor:pointer;
    font-size:0.92rem;
    transition:0.2s;
}

.btn-voto:hover{
    background:#e67e00;
    transform:scale(1.02);
}

.btn-voto:disabled{
    opacity:.65;
    cursor:not-allowed;
    transform:none;
}

.ranking-box{
    background:rgba(255,255,255,0.97);
    color:#333;
    border-radius:18px;
    padding:24px;
    box-shadow:0 8px 20px rgba(0,0,0,0.18);
}

.ranking-titulo{
    color:#1a3a5a;
    font-weight:800;
    font-size:1.5rem;
    margin-bottom:20px;
    text-align:center;
}

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.72);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:1000;
}

.box{
    background:white;
    color:#333;
    border-radius:16px;
    padding:30px;
    text-align:center;
    max-width:360px;
    width:calc(100% - 30px);
    box-shadow:0 12px 40px rgba(0,0,0,0.35);
}

.box h2{
    color:#1a3a5a;
    margin-bottom:8px;
    font-size:1.5rem;
}

.gauge-wrap{
    display:flex;
    justify-content:center;
    align-items:center;
    margin:18px 0 10px;
}

.gauge{
    width:160px;
    height:160px;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
}

.gauge svg{
    width:160px;
    height:160px;
    display:block;
    transform:rotate(-90deg);
}

.gauge-bg{
    fill:none;
    stroke:#e6e6e6;
    stroke-width:12;
}

.gauge-progress{
    fill:none;
    stroke:#28a745;
    stroke-width:12;
    stroke-linecap:round;
    stroke-dasharray:377;
    stroke-dashoffset:0;
    transition:stroke-dashoffset 1s linear, stroke 0.3s ease;
}

.gauge-label{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    color:#1a3a5a;
    pointer-events:none;
}

.tempo-numero{
    font-size:2.2rem;
    font-weight:700;
    line-height:1;
}

.tempo-texto{
    font-size:0.82rem;
    color:#666;
    margin-top:6px;
    text-transform:uppercase;
    letter-spacing:0.5px;
}

.status-api{
    text-align:center;
    margin-top:14px;
    font-size:.9rem;
    opacity:.9;
}

/* PÓDIO */
.podio-wrap{
    display:flex;
    flex-direction:column;
    gap:22px;
}

.podio-topo{
    display:grid;
    grid-template-columns:1fr 1.2fr 1fr;
    gap:18px;
    align-items:end;
}

.podio-base{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:18px;
}

.podio-card{
    background:linear-gradient(180deg,#ffffff 0%, #f7f9fc 100%);
    border-radius:18px;
    padding:18px;
    box-shadow:0 10px 22px rgba(0,0,0,0.14);
    text-align:center;
    position:relative;
    overflow:hidden;
}

.podio-card::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    right:0;
    height:6px;
}

.podio-1::before{ background:linear-gradient(90deg,#f7b500,#ffd95e); }
.podio-2::before{ background:linear-gradient(90deg,#aeb7c2,#d9dfe6); }
.podio-3::before{ background:linear-gradient(90deg,#cd7f32,#e6a86b); }
.podio-4::before,
.podio-5::before{ background:linear-gradient(90deg,#1a3a5a,#ff8c00); }

.podio-1{
    transform:translateY(-10px);
}

.podio-posicao{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-width:54px;
    height:54px;
    border-radius:50%;
    font-weight:800;
    font-size:1rem;
    color:#fff;
    margin-bottom:12px;
}

.podio-1 .podio-posicao{ background:#f7b500; }
.podio-2 .podio-posicao{ background:#97a3b1; }
.podio-3 .podio-posicao{ background:#c9823a; }
.podio-4 .podio-posicao,
.podio-5 .podio-posicao{ background:#ff8c00; }

.podio-foto{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid #dbe5ef;
    display:block;
    margin:0 auto 14px;
    background:#eef2f7;
}

.podio-1 .podio-foto{
    width:150px;
    height:150px;
}

.podio-nome{
    font-size:1.2rem;
    font-weight:800;
    color:#1a3a5a;
    margin-bottom:8px;
}

.podio-1 .podio-nome{
    font-size:1.35rem;
}

.podio-votos{
    font-size:1.7rem;
    font-weight:900;
    color:#ff8c00;
    margin-bottom:6px;
}

.podio-pct{
    font-size:0.95rem;
    color:#5f6b77;
    margin-bottom:14px;
}

.podio-barra{
    width:100%;
    height:13px;
    background:#d9e1e8;
    border-radius:999px;
    overflow:hidden;
}

.podio-barra-progresso{
    height:100%;
    background:linear-gradient(90deg,#1a3a5a,#ff8c00);
    width:0%;
    transition:width .6s ease;
    border-radius:999px;
}

.podio-vazio{
    visibility:hidden;
}

@media (max-width:900px){
    .podio-topo{
        grid-template-columns:1fr;
    }

    .podio-base{
        grid-template-columns:1fr;
    }

    .podio-1{
        transform:none;
    }

    .podio-vazio{
        display:none;
    }
}

@media (max-width:700px){
    .card img{
        height:160px;
    }
}
</style>
</head>
<body>

<div class="container">
    <header>
        <h1>VOTAÇÃO MASCOTE SAGA SENAI</h1>
        <div class="subtitulo">Sistema de votação do SENAI</div>

        <div class="topbar">
            <button id="btnVotacao" class="ativo" onclick="abrirTela('votacao')">Tela de Votação</button>
            <button id="btnRanking" onclick="abrirTela('ranking')">Tela de Ranking</button>
        </div>
    </header>

    <div id="tela-votacao">
        <div class="opcoes" id="cards"></div>
        <div class="status-api" id="statusApi"></div>
    </div>

    <div id="tela-ranking">
        <div class="ranking-box">
            <div class="ranking-titulo">Pódio em Tempo Real</div>
            <div class="podio-wrap" id="ranking"></div>
        </div>
    </div>
</div>

<div class="modal" id="modal">
    <div class="box">
        <h2>Voto Confirmado</h2>

        <div class="gauge-wrap">
            <div class="gauge">
                <svg viewBox="0 0 140 140" aria-hidden="true">
                    <circle class="gauge-bg" cx="70" cy="70" r="60"></circle>
                    <circle class="gauge-progress" id="gaugeProgress" cx="70" cy="70" r="60"></circle>
                </svg>

                <div class="gauge-label">
                    <div class="tempo-numero" id="tempo">15</div>
                    <div class="tempo-texto">segundos</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbwYNCmPXlgKwQjfucgNytbb6vMM1NyOyVW2prpC-ugjeQkxziVDDgwwxDhfAXYrVd_3yQ/exec';
const SENHA_RANKING = 'SAGACETAFR';

function gerarPlaceholder(nome){
    const svg = `
    <svg xmlns="http://www.w3.org/2000/svg" width="400" height="400">
        <rect width="100%" height="100%" fill="#e9eef5"/>
        <rect x="18" y="18" width="364" height="364" rx="24" fill="#f7f9fc" stroke="#1a3a5a" stroke-width="6"/>
        <text x="50%" y="44%" font-size="28" text-anchor="middle" fill="#1a3a5a" font-family="Segoe UI, Arial, sans-serif" font-weight="bold">SEM IMAGEM</text>
        <text x="50%" y="58%" font-size="24" text-anchor="middle" fill="#ff8c00" font-family="Segoe UI, Arial, sans-serif">${nome}</text>
    </svg>`;
    return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
}

const mascotes = [
    { id:'senatron', nome:'david - SENATRON', img:'img/01 - SENATRON.jpg' },
    { id:'eric', nome:'Eric  - MIMI', img:'img/02 - Aluno Eric da turma de polímeros.jpg' },
    { id:'maria', nome:'Maria - SENIOR', img:'img/03 - Maria Gabrielle Oliveira de Paula.jpg' },
    { id:'gabriel', nome:'Gabriel - MAX', img:'img/04 - Gabriel.jpg' },
    { id:'volts', nome:'Breno - VOLTS', img:'img/05 - breno almeida felix - volts.jpg' },
    { id:'amanda', nome:'Amanda - RM6', img:'img/06 - uni 7 - Amanda dos Santos Melo.jpg' },
    { id:'clecio', nome:'Clecio - VOLTZ', img:'img/07 - voltz - Clecio De Oliveira Coelho.jpg' },
    { id:'jubao', nome:'Demetrio - JUBÃO', img:'img/08 - jubão - Demétrio da Silva costa costa.jpg' },
    { id:'volta', nome:'Valniele - VOLTA', img:'img/09 - VOLTA - Valniele Maia Buriti Da Silva.jpg' }
].map(m => ({ ...m, fallback: gerarPlaceholder(m.nome) }));

let bloqueado = false;
let intervaloRanking = null;

function renderCards(){
    const c = document.getElementById("cards");

    c.innerHTML = mascotes.map(m => `
        <div class="card">
            <img src="${m.img}" alt="${m.nome}" onerror="this.onerror=null;this.src='${m.fallback}'">
            <div class="card-nome">${m.nome}</div>
            <button class="btn-voto" id="btn_${m.id}" onclick="votar('${m.id}')">Votar</button>
        </div>
    `).join("");
}

async function buscarRanking(){
    const resp = await fetch(`${WEBAPP_URL}?action=ranking&_=${Date.now()}`);
    if (!resp.ok) throw new Error('Falha ao buscar ranking.');
    return await resp.json();
}

function desenharRanking(payload){
    const rankingCompleto = Array.isArray(payload.ranking) ? payload.ranking : [];
    const ranking = rankingCompleto.slice(0, 5);
    const total = Number(payload.total) || 0;
    const r = document.getElementById("ranking");

    function criarCard(item, index){
        if(!item){
            return `<div class="podio-card podio-vazio"></div>`;
        }

        const meta = mascotes.find(m => m.id === item.id) || {};
        const p = total ? (Number(item.votos || 0) / total * 100) : 0;
        const fallback = meta.fallback || '';
        const img = meta.img || '';
        const posicao = index + 1;

        return `
            <div class="podio-card podio-${posicao}">
                <div class="podio-posicao">${posicao}º</div>

                <img class="podio-foto"
                     src="${img}"
                     alt="${item.nome}"
                     onerror="this.onerror=null;this.src='${fallback}'">

                <div class="podio-nome">${item.nome}</div>
                <div class="podio-votos">${Number(item.votos || 0)}</div>
                <div class="podio-pct">${p.toFixed(1)}% dos votos</div>

                <div class="podio-barra">
                    <div class="podio-barra-progresso" style="width:${p}%"></div>
                </div>
            </div>
        `;
    }

    const segundo = ranking[1] || null;
    const primeiro = ranking[0] || null;
    const terceiro = ranking[2] || null;
    const quarto = ranking[3] || null;
    const quinto = ranking[4] || null;

    r.innerHTML = `
        <div class="podio-topo">
            ${criarCard(segundo, 1)}
            ${criarCard(primeiro, 0)}
            ${criarCard(terceiro, 2)}
        </div>

        <div class="podio-base">
            ${criarCard(quarto, 3)}
            ${criarCard(quinto, 4)}
        </div>
    `;
}

async function atualizarRanking(){
    try{
        const payload = await buscarRanking();
        desenharRanking(payload);
        setStatus('Conectado ao Google Sheets.');
    }catch(err){
        setStatus('Erro ao conectar com o Google Sheets.');
        console.error(err);
    }
}

async function votar(id){
    if (bloqueado) return;

    try{
        bloqueado = true;
        desabilitarBotoes(true);

        const resp = await fetch(`${WEBAPP_URL}?action=vote&id=${encodeURIComponent(id)}&_=${Date.now()}`);
        const dados = await resp.json();

        if (!dados.ok) {
            throw new Error(dados.error || 'Erro ao registrar voto.');
        }

        if (dados.ranking && typeof dados.total !== 'undefined') {
            desenharRanking({
                ranking: dados.ranking,
                total: dados.total
            });
        } else {
            await atualizarRanking();
        }

        iniciarBloqueio15s();

    }catch(err){
        console.error(err);
        alert(err.message || 'Erro ao registrar voto.');
        bloqueado = false;
        desabilitarBotoes(false);
    }
}

function iniciarBloqueio15s(){
    const modal = document.getElementById("modal");
    const gauge = document.getElementById("gaugeProgress");
    const tempo = document.getElementById("tempo");

    modal.style.display = "flex";

    let t = 15;
    const total = 15;
    const raio = 60;
    const circumference = 2 * Math.PI * raio;

    gauge.style.strokeDasharray = `${circumference}`;
    gauge.style.strokeDashoffset = "0";
    gauge.style.stroke = "#28a745";
    tempo.innerText = t;

    const timer = setInterval(() => {
        t--;
        tempo.innerText = t;

        const progresso = (total - t) / total;
        gauge.style.strokeDashoffset = `${circumference * progresso}`;

        if (t <= 5) {
            gauge.style.stroke = "#dc3545";
        } else if (t <= 10) {
            gauge.style.stroke = "#ff8c00";
        } else {
            gauge.style.stroke = "#28a745";
        }

        if (t <= 0) {
            clearInterval(timer);
            modal.style.display = "none";
            bloqueado = false;
            desabilitarBotoes(false);
        }
    }, 1000);
}

function desabilitarBotoes(flag){
    mascotes.forEach(m => {
        const btn = document.getElementById(`btn_${m.id}`);
        if (btn) btn.disabled = flag;
    });
}

function abrirTela(tela){
    const telaVotacao = document.getElementById("tela-votacao");
    const telaRanking = document.getElementById("tela-ranking");
    const btnVotacao = document.getElementById("btnVotacao");
    const btnRanking = document.getElementById("btnRanking");

    if (tela === "ranking") {
        const senha = window.prompt("Digite a senha para acessar o ranking:");

        if (senha === null) return;

        if (senha !== SENHA_RANKING) {
            alert("Senha incorreta.");
            return;
        }

        telaVotacao.style.display = "none";
        telaRanking.style.display = "block";
        btnVotacao.classList.remove("ativo");
        btnRanking.classList.add("ativo");

        atualizarRanking();

        if (intervaloRanking) clearInterval(intervaloRanking);
        intervaloRanking = setInterval(atualizarRanking, 1000);
        return;
    }

    telaVotacao.style.display = "block";
    telaRanking.style.display = "none";
    btnVotacao.classList.add("ativo");
    btnRanking.classList.remove("ativo");

    if (intervaloRanking) {
        clearInterval(intervaloRanking);
        intervaloRanking = null;
    }
}

function setStatus(msg){
    const el = document.getElementById('statusApi');
    if (el) el.textContent = msg;
}

renderCards();
atualizarRanking();
abrirTela('votacao');
</script>

</body>
</html>
